name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      matrix:
        include:
          - python-version: "3.12"
            experimental: false
          - python-version: "3.13"
            experimental: false
          - python-version: "3.14"
            experimental: true

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gdal-bin libgdal-dev libproj-dev

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Set up Node.js
      if: matrix.python-version == '3.12'
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: pnpm
        cache-dependency-path: src/niamoto/gui/ui/pnpm-lock.yaml

    - name: Set up pnpm
      if: matrix.python-version == '3.12'
      uses: pnpm/action-setup@v4
      with:
        version: 10.17.1

    - name: Install Python dependencies
      run: |
        uv sync --group dev

    - name: Install frontend dependencies
      if: matrix.python-version == '3.12'
      working-directory: src/niamoto/gui/ui
      run: |
        pnpm install --frozen-lockfile

    - name: Run Ruff
      run: |
        uv run --group dev ruff check .

    - name: Run Tests
      run: |
        uv run --group dev pytest -n auto --cov=niamoto tests/ --cov-report=xml --cov-report=html

    - name: Run frontend tests with coverage
      if: matrix.python-version == '3.12'
      working-directory: src/niamoto/gui/ui
      run: |
        pnpm test:coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: niamoto/niamoto
        fail_ci_if_error: true

    - name: Upload frontend coverage to Codecov
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v5
      with:
        files: ./src/niamoto/gui/ui/coverage/lcov.info
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: niamoto/niamoto
        fail_ci_if_error: true
        flags: frontend

    - name: Upload coverage report
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/
        if-no-files-found: error

    - name: Upload frontend coverage report
      if: matrix.python-version == '3.12'
      uses: actions/upload-artifact@v7
      with:
        name: frontend-coverage-report
        path: src/niamoto/gui/ui/coverage/
        if-no-files-found: error
