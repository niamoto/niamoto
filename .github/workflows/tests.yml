name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: apt-gdal-${{ runner.os }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gdal-bin libgdal-dev libproj-dev

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Cache uv virtualenv
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}

    - name: Install Python dependencies
      run: |
        uv venv --clear
        uv pip install -e ".[dev]"

    - name: Run Ruff
      run: |
        uv run ruff check .

    - name: Run Tests
      run: |
        uv run pytest -n auto --cov=niamoto tests/ --cov-report=xml --cov-report=html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: niamoto/niamoto
        fail_ci_if_error: true

    - name: Upload coverage report
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/
        if-no-files-found: error
