name: Build Tauri Desktop

env:
  PYINSTALLER_VERSION: "6.19.0"

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-tauri:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macOS-arm64
            target: aarch64-apple-darwin
            binary_suffix: ''
          - os: ubuntu-22.04
            name: Linux-x86_64
            target: x86_64-unknown-linux-gnu
            binary_suffix: ''
          - os: ubuntu-22.04-arm
            name: Linux-arm64
            target: aarch64-unknown-linux-gnu
            binary_suffix: ''
          - os: windows-latest
            name: Windows-x86_64
            target: x86_64-pc-windows-msvc
            binary_suffix: '.exe'

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      # --- Sync version from release tag ---
      - name: Set version from release tag
        if: github.event_name == 'release'
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "Setting Tauri version to $VERSION"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      # --- System dependencies ---
      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            gdal-bin libgdal-dev libproj-dev

      # --- Frontend (must run before PyInstaller so dist/ is included) ---
      - name: Enable pnpm
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: src/niamoto/gui/ui/pnpm-lock.yaml

      - name: Install frontend deps
        run: cd src/niamoto/gui/ui && pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: src/niamoto/gui/ui
        run: pnpm run build

      # --- Python sidecar ---
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python package
        run: |
          pip install uv
          uv venv
          uv pip install -e .
          uv pip install pyinstaller==${{ env.PYINSTALLER_VERSION }}

      - name: Build Python binary (PyInstaller)
        env:
          NIAMOTO_PYINSTALLER_MODE: onedir
          NIAMOTO_PYINSTALLER_CONSOLE: "false"
        run: uv run pyinstaller build_scripts/niamoto.spec --clean --noconfirm

      - name: Place sidecar resources (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          rm -rf src-tauri/resources/sidecar/${{ matrix.target }}
          mkdir -p src-tauri/resources/sidecar/${{ matrix.target }}
          cp -R dist/niamoto src-tauri/resources/sidecar/${{ matrix.target }}/niamoto
          chmod +x src-tauri/resources/sidecar/${{ matrix.target }}/niamoto/niamoto

      - name: Repair macOS Python framework layout in source sidecar
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          set -euo pipefail

          sidecar_dir="src-tauri/resources/sidecar/${{ matrix.target }}/niamoto"
          framework_path="$sidecar_dir/_internal/Python.framework"
          versioned_python_path="$(find "$framework_path/Versions" -type f -name Python | head -n 1)"

          if [ -z "$versioned_python_path" ]; then
            echo "Could not locate versioned Python binary inside Python.framework" >&2
            exit 1
          fi

          python_framework_version="$(basename "$(dirname "$versioned_python_path")")"

          rm -f "$framework_path/Versions/Current"
          ln -s "$python_framework_version" "$framework_path/Versions/Current"

          rm -f "$framework_path/Python"
          ln -s "Versions/Current/Python" "$framework_path/Python"

          if [ -d "$framework_path/Versions/$python_framework_version/Resources" ]; then
            rm -rf "$framework_path/Resources"
            ln -s "Versions/Current/Resources" "$framework_path/Resources"
          fi

          rm -f "$sidecar_dir/_internal/Python"
          ln -s "Python.framework/Versions/$python_framework_version/Python" "$sidecar_dir/_internal/Python"

          ls -l \
            "$sidecar_dir/_internal/Python" \
            "$framework_path/Python" \
            "$framework_path/Versions/Current" \
            "$versioned_python_path"

      - name: Place sidecar resources (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force src-tauri/resources/sidecar/${{ matrix.target }} -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path src-tauri/resources/sidecar/${{ matrix.target }}
          Copy-Item dist/niamoto -Destination src-tauri/resources/sidecar/${{ matrix.target }}/niamoto -Recurse

      # --- Rust + Tauri ---
      - uses: dtolnay/rust-toolchain@stable

      - name: Validate Apple signing secrets
        if: matrix.os == 'macos-14'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          required_vars=(
            APPLE_CERTIFICATE
            APPLE_CERTIFICATE_PASSWORD
            APPLE_SIGNING_IDENTITY
            APPLE_ID
            APPLE_PASSWORD
            APPLE_TEAM_ID
          )

          missing=()
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              missing+=("$var_name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required macOS signing secrets: ${missing[*]}" >&2
            exit 1
          fi

      - name: Import Apple signing certificate
        if: matrix.os == 'macos-14'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail

          cert_base64_path="$RUNNER_TEMP/apple-signing-certificate.txt"
          cert_path="$RUNNER_TEMP/apple-signing-certificate.p12"
          keychain_path="$RUNNER_TEMP/niamoto-signing.keychain-db"
          keychain_password="$(openssl rand -base64 24 | tr -d '\n')"

          printf '%s' "$APPLE_CERTIFICATE" > "$cert_base64_path"
          base64 --decode -i "$cert_base64_path" -o "$cert_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/pkgbuild \
            -T /usr/bin/productbuild \
            -k "$keychain_path"
          security set-keychain-settings -t 3600 -u "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          keychains=()
          while IFS= read -r line; do
            line="$(printf '%s' "$line" | sed 's/^[[:space:]]*//; s/^"//; s/"$//')"
            if [ -n "$line" ]; then
              keychains+=("$line")
            fi
          done < <(security list-keychain -d user)

          security list-keychain -d user -s "${keychains[@]}" "$keychain_path"

          {
            echo "NIAMOTO_SIGNING_KEYCHAIN=$keychain_path"
          } >> "$GITHUB_ENV"

          if ! security find-identity -v -p codesigning "$keychain_path" | grep -F "$APPLE_SIGNING_IDENTITY" >/dev/null; then
            echo "Imported keychain does not contain expected signing identity: $APPLE_SIGNING_IDENTITY" >&2
            security find-identity -v -p codesigning "$keychain_path" || true
            exit 1
          fi

      - name: Codesign sidecar Mach-O binaries
        if: matrix.os == 'macos-14'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail

          sidecar_dir="src-tauri/resources/sidecar/${{ matrix.target }}/niamoto"
          if [ ! -d "$sidecar_dir" ]; then
            echo "Expected sidecar directory not found: $sidecar_dir" >&2
            exit 1
          fi

          while IFS= read -r -d '' path; do
            case "$path" in
              */_internal/Python.framework/Python)
                echo "Skipping top-level framework Python entrypoint in favor of bundle signing: $path"
                continue
                ;;
              */_internal/Python.framework/Versions/*/Python)
                echo "Skipping framework-version Python binary in favor of bundle signing: $path"
                continue
                ;;
            esac

            file_description="$(file -b "$path")"
            if [[ "$file_description" != *"Mach-O"* ]]; then
              continue
            fi

            codesign_args=(
              --force
              --sign "$APPLE_SIGNING_IDENTITY"
              --keychain "$NIAMOTO_SIGNING_KEYCHAIN"
              --timestamp
            )

            if [[ "$file_description" == *"executable"* ]]; then
              codesign_args+=(--options runtime)
            fi

            codesign "${codesign_args[@]}" "$path"
          done < <(find "$sidecar_dir" -type f -print0)

          while IFS= read -r -d '' framework_path; do
            codesign_args=(
              --force
              --sign "$APPLE_SIGNING_IDENTITY"
              --keychain "$NIAMOTO_SIGNING_KEYCHAIN"
              --timestamp
            )

            case "$framework_path" in
              */_internal/Python.framework)
                python_framework_version="$(readlink "$framework_path/Versions/Current")"
                if [ -z "$python_framework_version" ]; then
                  echo "Could not determine active Python.framework version" >&2
                  exit 1
                fi
                codesign_args+=(--bundle-version "$python_framework_version")
                ;;
            esac

            codesign "${codesign_args[@]}" "$framework_path"
          done < <(find "$sidecar_dir" -type d -name '*.framework' -print0)

          for path in "$sidecar_dir/_internal/Python"; do
            codesign --verify --verbose=4 "$path"
            codesign -dvvv "$path" 2>&1 | grep -E '^(Executable|Identifier|Format|Authority|TeamIdentifier|Timestamp)=' || true
          done

          python_framework_version="$(readlink "$sidecar_dir/_internal/Python.framework/Versions/Current")"
          codesign --verify --deep --strict --verbose=2 --bundle-version "$python_framework_version" "$sidecar_dir/_internal/Python.framework"

      # Release event: build + attach bundles to existing GitHub Release
      - name: Build Tauri (release)
        if: github.event_name == 'release'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: src-tauri
          tagName: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Manual trigger: build only (no release), let the post-step repair/re-sign/notarize macOS.
      - name: Build Tauri (manual, macOS pre-notary)
        if: github.event_name == 'workflow_dispatch' && matrix.os == 'macos-14'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: src-tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Repair, re-sign and notarize macOS app (manual)
        if: github.event_name == 'workflow_dispatch' && matrix.os == 'macos-14'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          scripts/dev/verify_macos_distribution.sh \
            --app src-tauri/target/release/bundle/macos/Niamoto.app \
            --identity "$APPLE_SIGNING_IDENTITY" \
            --keychain "$NIAMOTO_SIGNING_KEYCHAIN" \
            --skip-spctl \
            --notarize

      - name: Build Tauri (manual, non-macOS)
        if: github.event_name == 'workflow_dispatch' && matrix.os != 'macos-14'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: src-tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # Manual trigger: upload as workflow artifact
      - name: Upload Tauri bundle (manual macOS)
        if: github.event_name == 'workflow_dispatch' && matrix.os == 'macos-14'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.app.tar.gz.sig
          retention-days: 7

      - name: Upload Tauri bundle (manual non-macOS)
        if: github.event_name == 'workflow_dispatch' && matrix.os != 'macos-14'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.msi
          retention-days: 7
