name: Build Tauri Desktop

env:
  PYINSTALLER_VERSION: "6.19.0"

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-tauri:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macOS-arm64
            target: aarch64-apple-darwin
            binary_suffix: ''
          - os: ubuntu-22.04
            name: Linux-x86_64
            target: x86_64-unknown-linux-gnu
            binary_suffix: ''
          - os: ubuntu-22.04-arm
            name: Linux-arm64
            target: aarch64-unknown-linux-gnu
            binary_suffix: ''
          - os: windows-latest
            name: Windows-x86_64
            target: x86_64-pc-windows-msvc
            binary_suffix: '.exe'

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      # --- Sync version from release tag ---
      - name: Set version from release tag
        if: github.event_name == 'release'
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "Setting Tauri version to $VERSION"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      # --- System dependencies ---
      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            gdal-bin libgdal-dev libproj-dev

      # --- Frontend (must run before PyInstaller so dist/ is included) ---
      - name: Enable pnpm
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: src/niamoto/gui/ui/pnpm-lock.yaml

      - name: Install frontend deps
        run: cd src/niamoto/gui/ui && pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: src/niamoto/gui/ui
        run: pnpm run build

      # --- Python sidecar ---
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python package
        run: |
          pip install uv
          uv venv
          uv pip install -e .
          uv pip install pyinstaller==${{ env.PYINSTALLER_VERSION }}

      - name: Build Python binary (PyInstaller)
        env:
          NIAMOTO_PYINSTALLER_MODE: onedir
          NIAMOTO_PYINSTALLER_CONSOLE: "false"
        run: uv run pyinstaller build_scripts/niamoto.spec --clean --noconfirm

      - name: Place sidecar resources (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          rm -rf src-tauri/resources/sidecar/${{ matrix.target }}
          mkdir -p src-tauri/resources/sidecar/${{ matrix.target }}
          cp -R dist/niamoto src-tauri/resources/sidecar/${{ matrix.target }}/niamoto
          chmod +x src-tauri/resources/sidecar/${{ matrix.target }}/niamoto/niamoto

      - name: Place sidecar resources (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force src-tauri/resources/sidecar/${{ matrix.target }} -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path src-tauri/resources/sidecar/${{ matrix.target }}
          Copy-Item dist/niamoto -Destination src-tauri/resources/sidecar/${{ matrix.target }}/niamoto -Recurse

      # --- Rust + Tauri ---
      - uses: dtolnay/rust-toolchain@stable

      # Release event: build + attach bundles to existing GitHub Release
      - name: Build Tauri (release)
        if: github.event_name == 'release'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: src-tauri
          tagName: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # Manual trigger: build only (no release)
      - name: Build Tauri (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: src-tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # Manual trigger: upload as workflow artifact
      - name: Upload Tauri bundle
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.msi
          retention-days: 7
