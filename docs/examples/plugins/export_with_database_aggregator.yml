# Example HTML export using database_aggregator outputs
# Reuse the same group as transform.yml. This example assumes `group_by: shapes`.

exports:
  - name: analytics_dashboard
    enabled: true
    exporter: html_page_exporter
    params:
      template_dir: "templates"
      output_dir: "exports/web"
      site:
        title: "Niamoto Analytics Dashboard"
        description: "Site-wide indicators rendered on HTML detail pages"
        primary_color: "#2e7d32"
      navigation:
        - text: "Analytics"
          url: "/analytics/"
      copy_assets_from:
        - "templates/assets/"
    groups:
      - group_by: shapes
        page_template: "page.html"
        output_pattern: "analytics/{id}.html"
        widgets:
          - plugin: info_grid
            title: "Site Overview"
            description: "Global metrics returned by the database_aggregator transform entry."
            data_source: "site_overview"
            params:
              grid_columns: 4
              items:
                - label: "Total Species"
                  source: "total_species"
                  icon: "fas fa-leaf"
                - label: "Total Occurrences"
                  source: "total_occurrences"
                  icon: "fas fa-map-marker-alt"
                - label: "Endemic Species"
                  source: "endemic_percentage"
                  unit: "%"
                  icon: "fas fa-star"
                - label: "Occurrences per Plot"
                  source: "occurrences_per_plot"
                  icon: "fas fa-chart-line"

          - plugin: info_grid
            title: "Data Quality"
            description: "Computed quality scores returned by database_aggregator."
            data_source: "data_quality_report"
            params:
              grid_columns: 4
              items:
                - label: "Overall Quality"
                  source: "overall_data_quality"
                  unit: "%"
                - label: "Taxonomy"
                  source: "taxonomy_completeness.completeness_pct"
                  unit: "%"
                - label: "Spatial"
                  source: "spatial_completeness.completeness_pct"
                  unit: "%"
                - label: "Plots"
                  source: "plot_completeness.completeness_pct"
                  unit: "%"

          - plugin: info_grid
            title: "Database Metrics"
            description: "Operational counters derived from SQL queries."
            data_source: "database_metrics"
            params:
              grid_columns: 2
              items:
                - label: "Database Size"
                  source: "database_size_mb"
                  unit: "MB"
                  icon: "fas fa-database"
                - label: "Main Tables"
                  value: "taxon_ref, occurrences, plot_ref, shape_ref"
                  icon: "fas fa-table"
