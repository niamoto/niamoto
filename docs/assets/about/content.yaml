  last_verified: 2026-04-18

sections:
  fr:
    summary: Niamoto est développé par une petite équipe interdisciplinaire et soutenu par des partenaires institutionnels engagés dans la conservation de la biodiversité.
    team:
      title: Niamoteam
      intro: Projet collaboratif open-source pour la conservation de la biodiversité.
    partners:
      title: Partenaires & financeurs
      intro: >
        Le développement de Niamoto s'inscrit dans le cadre du projet de recherche
        "Partenariat pour l'Analyse des DynaMIques de REforestation et de la
        résilience forestière (ADMIRE)", établi entre la Province Nord, l'IAC et
        le Cirad. Ce projet vise à développer des outils informatiques pour l'aide
        à la décision dans la gestion des espaces naturels de la Province Nord de la
        Nouvelle-Calédonie.
  en:
    summary: Niamoto is developed by a small interdisciplinary team and supported by institutional partners committed to biodiversity conservation.
    team:
      title: Niamoteam
      intro: Open-source collaborative project for biodiversity conservation.
    partners:
      title: Partners & funders
      intro: >
        Niamoto was developed within the ADMIRE research project
        ("Partnership for the Analysis of Reforestation Dynamics and Forest
        Resilience"), established by Province Nord, IAC, and Cirad. The project
        develops software that supports decision-making for the management of
        natural areas in Province Nord, New Caledonia.

