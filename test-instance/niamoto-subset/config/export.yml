exports:
- name: web_pages
  enabled: true
  exporter: html_page_exporter
  params:
    template_dir: templates/
    output_dir: exports/web
    site:
      title: Niamoto
      logo_header: files/niamoto_logo.png
      logo_footer: files/niamoto_logo.png
      lang: fr
      primary_color: '#228b22'
      nav_color: '#228b22'
      github_url: https://github.com/niamoto/niamoto
      footer_bg_color: '#228b22'
      languages:
      - fr
      - en
      partners:
      - name: Province Nord
        logo: files/pn_100.png
        url: https://www.province-nord.nc
      - name: Province Sud
        logo: files/ps_100.png
        url: https://www.province-sud.nc
      - name: Endemia
        logo: files/endemia_100.png
        url: https://endemia.nc
      - name: UMR AMAP
        logo: files/amap_100.png
        url: https://amap.cirad.fr
      - name: Herbier de Nouvelle-Calédonie
        logo: files/herbarium_100.png
        url: http://publish.plantnet-project.org/project/herbier-noumea
      - name: IAC
        logo: files/iac_100.png
        url: https://iac.nc
      - name: IRD
        logo: files/ird_100.png
        url: https://nouvelle-caledonie.ird.fr
      - name: CIRAD
        logo: files/cirad_100.png
        url: https://www.cirad.fr
      - name: OFB
        logo: files/ofb_100.png
        url: https://www.ofb.gouv.fr
    navigation:
    - text:
        fr: Accueil
        en: Home
      url: /index.html
    - text:
        fr: Méthodologie
        en: Methodology
      url: /methodology.html
    - text:
        fr: Arbres
        en: Trees
      url: /trees.html
      children:
      - text:
          fr: Explorer les données
          en: Explore the data
        url: /taxons/index.html
    - text:
        fr: Peuplements
        en: Plots
      url: /plots.html
      children:
      - text:
          fr: Explorer les données
          en: Explore the data
        url: /plots/index.html
    - text:
        fr: Forêt
        en: Forest
      url: /forests.html
      children:
      - text:
          fr: Explorer les données
          en: Explore the data
        url: /shapes/index.html
    - text:
        fr: Ressources
        en: Resources
      url: /resources.html
      children:
      - text:
          fr: Équipe & Partenaires
          en: Team & Partners
        url: /team.html
      - text:
          fr: Bibliographie
          en: Bibliography
        url: /bibliography.html
    footer_navigation:
    - title:
        fr: Projet
        en: Project
      links:
      - text:
          fr: À propos
          en: About
        url: /resources.html
        external: false
      - text:
          fr: Équipe
          en: Team
        url: /team.html
        external: false
      - text:
          fr: Bibliographie
          en: Bibliography
        url: /bibliography.html
        external: false
    - title:
        fr: Données
        en: Data
      links:
      - text:
          fr: Arbres
          en: Trees
        url: /taxon.html
        external: false
      - text:
          fr: Parcelles
          en: Plots
        url: /plot.html
        external: false
      - text:
          fr: Forêts
          en: Forests
        url: /shape.html
        external: false
    - title:
        fr: Communauté
        en: Community
      links:
      - text: GitHub
        url: https://github.com/niamoto/niamoto
        external: true
  static_pages:
  - name: home
    template: index.html
    output_file: index.html
    context:
      content_source: templates/content/home.md
      title: Niamoto
      subtitle: Portail de la forêt de Nouvelle-Calédonie
      hero_image: files/home_background.jpg
      partners:
      - name: Province Nord
        logo: files/pn_100.png
        url: https://www.province-nord.nc
      - name: Province Sud
        logo: files/ps_100.png
        url: https://www.province-sud.nc
      - name: Endemia
        logo: files/endemia_100.png
        url: https://endemia.nc
      - name: UMR AMAP
        logo: files/amap_100.png
        url: https://amap.cirad.fr
      - name: Herbier de Nouvelle-Calédonie
        logo: files/herbarium_100.png
        url: http://publish.plantnet-project.org/project/herbier-noumea
      - name: IAC
        logo: files/iac_100.png
        url: https://iac.nc
      - name: IRD
        logo: files/ird_100.png
        url: https://nouvelle-caledonie.ird.fr
      - name: CIRAD
        logo: files/cirad_100.png
        url: https://www.cirad.fr
      - name: OFB
        logo: files/ofb_100.png
        url: https://www.ofb.gouv.fr
      stats:
      - icon: leaf
        value: 1 208
        label: Taxons d'arbres
      - icon: trees
        value: 5 400 km²
        label: De forêt cartographiée
      - icon: map-pin
        value: '509'
        label: Parcelles inventoriées
      - icon: microscope
        value: 70 000+
        label: Arbres mesurés
      features:
      - icon: leaf
        title: Arbres
        description: Explorer les espèces d'arbres, leur répartition et leurs traits
          fonctionnels
        url: taxons/index.html
      - icon: map-pin
        title: Peuplements
        description: Découvrir les sites d'étude et la composition des peuplements
          forestiers
        url: plots/index.html
      - icon: map
        title: Forêt
        description: Visualiser la couverture forestière par commune, substrat et
          milieu de vie
        url: shapes/index.html
  - name: methodology
    template: page.html
    output_file: methodology.html
    context:
      content_source: templates/content/methodology.md
      title: Méthodo
  - name: trees
    template: page.html
    output_file: trees.html
    context:
      content_source: templates/content/trees.md
      title: Présentation des arbres
  - name: plots
    template: page.html
    output_file: plots.html
    context:
      content_source: templates/content/plots.md
      title: Présentation des peuplements
  - name: forests
    template: page.html
    output_file: forests.html
    context:
      content_source: templates/content/forests.md
      title: Présentation de la forêt
  - name: resources
    template: page.html
    output_file: resources.html
    context:
      title: Ressources
      introduction: Retrouvez ici l'équipe du projet, les partenaires et la bibliographie
        scientifique.
  - name: team
    template: team.html
    output_file: team.html
    context:
      title: Équipe & Partenaires
      introduction: L'équipe Niamoto réunit des botanistes, écologues, modélisateurs
        et développeurs autour de l'étude et la conservation des forêts.
      team_source: data/team-team.json
      partners:
      - name: Province Nord
        logo: files/pn_100.png
        url: https://www.province-nord.nc
        description: Collectivité de la Nouvelle-Calédonie
      - name: Province Sud
        logo: files/ps_100.png
        url: https://www.province-sud.nc
        description: Collectivité de la Nouvelle-Calédonie
      - name: UMR AMAP
        logo: files/amap_100.png
        url: https://amap.cirad.fr
        description: Botanique et modélisation de l'architecture des plantes
      - name: Herbier de Nouvelle-Calédonie
        logo: files/herbarium_100.png
        url: http://publish.plantnet-project.org/project/herbier-noumea
        description: Collections botaniques de référence
      - name: IAC
        logo: files/iac_100.png
        url: https://iac.nc
        description: Institut Agronomique néo-Calédonien
      - name: IRD
        logo: files/ird_100.png
        url: https://nouvelle-caledonie.ird.fr
        description: Institut de Recherche pour le Développement
      - name: CIRAD
        logo: files/cirad_100.png
        url: https://www.cirad.fr
        description: Centre de coopération internationale en recherche agronomique
      - name: Endemia
        logo: files/endemia_100.png
        url: https://endemia.nc
        description: Base de données de la biodiversité de Nouvelle-Calédonie
      - name: OFB
        logo: files/ofb_100.png
        url: https://www.ofb.gouv.fr
        description: Office Français de la Biodiversité
      funders:
      - name: Province Nord
        logo: files/pn_100.png
        url: https://www.province-nord.nc
      - name: Province Sud
        logo: files/ps_100.png
        url: https://www.province-sud.nc
      - name: CNRT
        url: https://cnrt.nc
      - name: OFB
        logo: files/ofb_100.png
        url: https://www.ofb.gouv.fr
  - name: bibliography
    template: bibliography.html
    output_file: bibliography.html
    context:
      title: Bibliographie
      introduction: Publications scientifiques, thèses, rapports et communications
        issues des travaux de l'équipe Niamoto.
      references_source: data/bibliography-references.json
      categories:
      - id: article
        label: Articles
      - id: thesis
        label: Thèses & Mémoires
      - id: report
        label: Rapports
      - id: conference
        label: Conférences
      - id: other
        label: Autres
  groups:
  - group_by: taxons
    output_pattern: taxons/{id}.html
    index_output_pattern: taxons/index.html
    index_generator:
      enabled: true
      template: group_index.html
      page_config:
        title: Liste des Taxons
        description: Espèces et sous-espèces de Nouvelle-Calédonie
        items_per_page: 24
      filters:
      - field: general_info.rank.value
        values:
        - species
        - infra
        operator: in
      display_fields:
      - name: name
        source: general_info.name.value
        fallback: full_name
        type: text
        label: Nom scientifique
        searchable: true
      - name: rank
        source: general_info.rank.value
        type: select
        label: Rang taxonomique
        format: map
        mapping:
          species: Espèce
          infra: Sous-espèce
        filter_options:
        - value: species
          label: Espèce
        - value: infra
          label: Sous-espèce
      - name: parent_family
        source: general_info.parent_family.value
        type: select
        label: Famille
        dynamic_options: true
      - name: parent_genus
        source: general_info.parent_genus.value
        type: text
        label: Genre
      - name: endemic
        source: general_info.endemic.value
        type: boolean
        label: Endémisme
        format: badge
        inline_badge: true
        true_label: Endémique
        badge_color: bg-green-600 text-white px-2 py-1 rounded-full text-xs font-semibold
          ml-2
      - name: occurrences_count
        source: general_info.occurrences_count.value
        type: text
        label: Nombre d'occurrences
        format: number
      - name: redlist_cat
        source: general_info.redlist_cat.value
        type: select
        label: Catégorie UICN
        format: map
        inline_badge: true
        mapping:
          CR: CR
          EN: EN
          VU: VU
          NT: NT
          LC: LC
          DD: DD
          NE: NE
        tooltip_mapping:
          CR: En danger critique
          EN: En danger
          VU: Vulnérable
          NT: Quasi menacé
          LC: Préoccupation mineure
          DD: Données insuffisantes
          NE: Non évalué
        badge_colors:
          CR: bg-red-600 text-white px-2 py-1 rounded-full text-xs font-semibold ml-2
          EN: bg-orange-500 text-white px-2 py-1 rounded-full text-xs font-semibold
            ml-2
          VU: bg-yellow-400 text-black px-2 py-1 rounded-full text-xs font-semibold
            ml-2
          NT: bg-green-700 text-white px-2 py-1 rounded-full text-xs font-semibold
            ml-2
          LC: bg-green-600 text-white px-2 py-1 rounded-full text-xs font-semibold
            ml-2
          DD: bg-gray-500 text-white px-2 py-1 rounded-full text-xs font-semibold
            ml-2
          NE: bg-gray-400 text-black px-2 py-1 rounded-full text-xs font-semibold
            ml-2
        filter_options:
        - value: CR
          label: En danger critique (CR)
        - value: EN
          label: En danger (EN)
        - value: VU
          label: Vulnérable (VU)
        - value: NT
          label: Quasi menacé (NT)
        - value: LC
          label: Préoccupation mineure (LC)
      - name: images
        source: general_info.images.value
        type: json_array
        display: image_preview
      - name: endemia_url
        source: general_info.endemia_url.value
        type: text
        display: link
        link_label: Endemia
        link_title: Voir sur Endemia
        link_target: _blank
        css_class: bg-amber-50 text-green-600 hover:bg-amber-100 px-3 py-1 rounded-md
          text-sm font-medium no-underline ml-2 transition-colors
      - name: id_florical
        source: general_info.id_florical.value
        type: text
        display: link
        link_label: Florical
        link_template: https://publish.plantnet-project.org/project/florical_fr/collection/florical/taxons/details/{value}
        link_title: Voir sur Florical
        link_target: _blank
        css_class: bg-emerald-50 text-teal-600 hover:bg-emerald-100 px-3 py-1 rounded-md
          text-sm font-medium no-underline ml-2 transition-colors
      views:
      - type: grid
        default: true
      - type: list
    widgets:
    - plugin: hierarchical_nav_widget
      title: Navigation taxonomique
      data_source: ''
      params:
        referential_data: taxons
        id_field: id
        name_field: full_name
        lft_field: lft
        rght_field: rght
        level_field: level
        parent_id_field: parent_id
        base_url: '{{ depth }}taxons/'
        show_search: true
    - plugin: interactive_map
      title: Distribution géographique
      description: Distribution géographique des occurrences
      data_source: distribution_map
      params:
        map_style: carto-voyager
        zoom: 7
        show_attribution: true
        layers:
        - id: occurrences
          source: coordinates
          type: circle_markers
          style:
            color: '#1fb99d'
            weight: 1
            fillColor: '#00716b'
            fillOpacity: 0.5
            radius: 8
    - plugin: info_grid
      title: Informations générales
      data_source: general_info
      params:
        grid_columns: 2
        items:
        - source: name
          label: Taxon
        - source: parent_family
          label: Famille
        - source: parent_genus
          label: Genre
        - source: rank
          label: Rang
          format: map
          mapping:
            family: Famille
            genus: Genre
            species: Espèce
            subspecies: Sous-espèce
        - source: occurrences_count
          label: Nombre d'occurrences
          format: number
        - source: images
          label: Images
          format: image
          image_mapping:
            url: big_thumb
            thumbnail: small_thumb
            author: auteur
            date: datmaj
    - plugin: bar_plot
      data_source: top_species
      title: Sous-taxons principaux
      description: Principaux sous-taxons (espèce, sous-espèce)
      params:
        orientation: h
        x_axis: counts
        y_axis: tops
        sort_order: ascending
        auto_color: true
        labels:
          x_axis: Nombre d'observations
          y_axis: Taxon
    - plugin: bar_plot
      data_source: dbh_distribution
      title: Distribution DBH
      description: Répartition par classe de diamètre
      params:
        transform: bins_to_df
        transform_params:
          bin_field: bins
          count_field: counts
          use_percentages: true
          percentage_field: percentages
          x_field: bin
          y_field: count
        orientation: v
        x_axis: bin
        y_axis: count
        show_legend: false
        labels:
          x_axis: Classe de diamètre (cm)
          y_axis: Fréquence (%)
        filter_zero_values: true
        gradient_color: '#8B4513'
        gradient_mode: luminance
    - plugin: bar_plot
      data_source: phenology_distribution
      title: Phénologie
      description: Phénologie des états fertiles (fleur, fruit)
      params:
        transform: monthly_data
        transform_params:
          labels_field: labels
          data_field: month_data
          melt: true
        orientation: v
        barmode: group
        x_axis: labels
        y_axis: value
        color_field: series
        color_discrete_map:
          fleur: '#FFB74D'
          fruit: '#81C784'
        labels:
          x_axis: Mois
          y_axis: Fréquence (%)
          color_field: État phénologique
        range_y:
        - 0
        - 50
    - plugin: bar_plot
      data_source: holdridge_distribution
      title: Milieu de vie (Holdridge)
      description: Répartition des occurrences par type d'habitat
      params:
        transform: category_with_labels
        transform_params:
          category_field: categories
          count_field: counts
          label_field: labels
          percentage_field: percentages
          use_percentages: true
          x_field: category_label
          y_field: value
        x_axis: category_label
        y_axis: value
        color_field: category_label
        orientation: v
        show_legend: false
        labels:
          category_label: Type d'habitat
          value: Pourcentage (%)
        color_discrete_map:
          Sec: '#F9A825'
          Humide: '#43A047'
          Très humide: '#1E88E5'
        filter_zero_values: true
    - plugin: donut_chart
      data_source: distribution_substrat
      title: Distribution substrat
      description: Distribution des occurrences par substrat
      params:
        label_mapping:
          num: non-Ultramafique (NUM)
          um: Ultramafique (UM)
        color_discrete_sequence:
        - '#a97742'
        - '#e1a553'
        hole_size: 0.5
        legend_orientation: h
    - plugin: bar_plot
      data_source: rainfall_distribution
      title: Répartition pluviométrie
      description: Distribution pluviométrique des occurrences
      params:
        transform: bins_to_df
        transform_params:
          bin_field: bins
          count_field: counts
          use_percentages: true
          percentage_field: percentages
          x_field: bin
          y_field: count
        orientation: h
        x_axis: count
        y_axis: bin
        show_legend: false
        labels:
          x_axis: Fréquence (%)
          y_axis: Précipitations (mm)
        filter_zero_values: true
        gradient_color: '#4682B4'
        gradient_mode: saturation
    - plugin: bar_plot
      data_source: elevation_distribution
      title: Distribution altitudinale
      description: Distribution altitudinale des occurrences
      params:
        transform: bins_to_df
        transform_params:
          bin_field: bins
          count_field: counts
          x_field: bin
          y_field: count
        orientation: h
        x_axis: count
        y_axis: bin
        show_legend: false
        labels:
          x_axis: Nombre d'occurrences
          y_axis: Altitude (m)
        filter_zero_values: true
        gradient_color: '#228B22'
        gradient_mode: luminance
    - plugin: bar_plot
      data_source: strata_distribution
      title: Stratification
      description: Répartition des occurrences par strate
      params:
        orientation: h
        x_axis: counts
        y_axis: labels
        show_legend: false
        labels:
          x_axis: Nombre d'occurrences
          y_axis: Strate
        color_field: labels
        color_discrete_map:
          Sous-bois: '#90A4AE'
          Sous-Canopée: '#66BB6A'
          Canopée: '#43A047'
          Emergent: '#2E7D32'
    - plugin: radial_gauge
      data_source: height_max
      title: Hauteur maximale
      description: Hauteur maximale atteinte
      params:
        value_field: max
        min_value: 0
        max_value: 40
        units: m
        style_mode: contextual
        show_axis: true
    - plugin: radial_gauge
      data_source: dbh_max
      title: Diamètre maximal (DBH)
      description: Diamètre maximal atteint
      params:
        value_field: max
        min_value: 0
        max_value: 500
        units: cm
        style_mode: contextual
        show_axis: false
    - plugin: radial_gauge
      data_source: wood_density
      title: Densité de bois
      description: Densité de bois moyenne
      params:
        value_field: mean
        min_value: 0
        max_value: 1.2
        units: g/cm³
        value_format: .2f
        style_mode: contextual
        show_axis: false
    - plugin: radial_gauge
      data_source: bark_thickness
      title: Épaisseur d'écorce
      description: Epaisseur moyenne de l'écorce
      params:
        value_field: mean
        min_value: 0
        max_value: 80
        units: mm
        style_mode: contextual
        show_axis: false
    - plugin: radial_gauge
      data_source: leaf_sla
      title: Surface foliaire spécifique (SLA)
      description: Surface foliaire spécifique moyenne
      params:
        value_field: mean
        min_value: 0
        max_value: 50
        units: m²·kg⁻¹
        value_format: .1f
        style_mode: contextual
        show_axis: true
    - plugin: radial_gauge
      data_source: leaf_area
      title: Surface foliaire
      description: Surface foliaire moyenne
      params:
        value_field: mean
        min_value: 0
        max_value: 1500
        units: cm²
        value_format: .0f
        style_mode: contextual
        show_axis: false
    - plugin: radial_gauge
      data_source: leaf_thickness
      title: Épaisseur des feuilles
      description: Epaisseur moyenne des feuilles
      params:
        value_field: mean
        min_value: 0
        max_value: 800
        units: µm
        value_format: .0f
        style_mode: contextual
        show_axis: false
  - group_by: plots
    output_pattern: plots/{id}.html
    index_output_pattern: plots/index.html
    index_generator:
      enabled: true
      template: group_index.html
      page_config:
        title: Liste des Parcelles
        description: Parcelles forestières de Nouvelle-Calédonie
        items_per_page: 20
      display_fields:
      - name: name
        source: general_info.name.value
        fallback: name
        type: text
        label: Nom de la parcelle
        searchable: true
      - name: elevation
        source: general_info.elevation.value
        type: text
        label: Altitude (m)
        format: number
      - name: rainfall
        source: general_info.rainfall.value
        type: text
        label: Pluviométrie (mm)
        format: number
      - name: holdridge
        source: general_info.holdridge.value
        type: select
        label: Milieu de vie
        format: map
        mapping:
          '1': Sec
          '2': Humide
          '3': Très humide
        filter_options:
        - value: '1'
          label: Sec
        - value: '2'
          label: Humide
        - value: '3'
          label: Très humide
      - name: in_um
        source: general_info.in_um.value
        type: boolean
        label: Substrat ultramafique
        format: map
        mapping:
          'True': Ultramafique
          'False': Non-ultramafique
      - name: occurrences_count
        source: general_info.occurrences_count.value
        type: text
        label: Nombre d'occurrences
        format: number
      views:
      - type: grid
        default: true
      - type: list
    widgets:
    - plugin: hierarchical_nav_widget
      title: Navigation par parcelles
      data_source: ''
      params:
        referential_data: plots
        id_field: id_plot
        name_field: plot
        base_url: '{{ depth }}plots/'
        show_search: true
    - plugin: info_grid
      data_source: general_info
      title: Informations générales
      params:
        grid_columns: 2
        items:
        - label: Parcelle
          source: plot_name
        - label: Précipitation annuelle moyenne
          source: rainfall
          unit: mm
        - label: Altitude
          source: elevation
          unit: m
        - label: Milieu de vie
          source: holdridge
          format: map
          mapping:
            '1': Sec
            '2': Humide
            '3': Très humide
        - label: Substrat
          source: in_um
          format: map
          mapping:
            'true': Substrat ultramafique
            'false': Substrat non-ultramafique
        - label: Nombre de familles
