  - group_by: shapes
    output_pattern: shapes/{id}.html
    index_output_pattern: shapes/index.html
    index_generator:
      enabled: true
      template: group_index.html
      page_config:
        title: Liste des Zones d'étude
        description: Zones d'étude et territoires de Nouvelle-Calédonie
        items_per_page: 16
      filters:
      - field: shape_info.type.value
        values:
        - shape
        operator: in
      display_fields:
      - name: name
        source: shape_info.name.value
        fallback: name
        type: text
        label: Nom de la zone
        searchable: true
      - name: type
        source: shape_info.type.value
        type: select
        label: Type de zone
        dynamic_options: true
      - name: land_area_ha
        source: general_info.land_area_ha.value
        type: text
        label: Surface totale (ha)
        format: number
      - name: forest_area_ha
        source: general_info.forest_area_ha.value
        type: text
        label: Surface forêt (ha)
        format: number
      - name: elevation_median
        source: general_info.elevation_median.value
        type: text
        label: Altitude médiane (m)
        format: number
      views:
      - type: grid
        default: true
      - type: list
    widgets:
    - plugin: hierarchical_nav_widget
      title: Navigation par zones
      data_source: ''
      params:
        referential_data: shapes
        id_field: id
        name_field: name
        parent_id_field: parent_id
        lft_field: lft
        rght_field: rght
        level_field: level
        base_url: '{{ depth }}shapes/'
        show_search: true
    - plugin: interactive_map
      data_source: geography
      title: Distribution de la forêt
      description: Distribution de la forêt dans l'emprise sélectionnée
      params:
        use_topojson: true
        show_attribution: true
        map_style: carto-voyager
        layers:
        - id: forest
          source: forest_cover_coords
          type: geojson
          style:
            color: '#228b22'
            weight: 0
            fillColor: '#228b22'
            fillOpacity: 0.8
        - id: shape
          source: shape_coords
          type: geojson
          style:
            color: '#2d5016'
            weight: 2
            fillOpacity: 0
    - plugin: info_grid
      data_source: general_info
      title: Informations générales
      params:
        grid_columns: 2
        items:
        - label: Surface totale
          source: land_area_ha
          unit: ha
        - label: Surface forêt
          source: forest_area_ha
          unit: ha
        - label: Forêt sur mine
          source: forest_mining_ha
          unit: ha
        - label: Forêt en réserve
          source: forest_reserve_ha
          unit: ha
        - label: Forêt sur captage (PPE)
          source: forest_ppe_ha
          unit: ha
        - label: Pluviométrie
          source: rainfall
          format: range
          units: mm
        - label: Altitude médiane
          source: elevation_median
          unit: m
        - label: Altitude maximale
          source: elevation_max
          unit: m
    - plugin: concentric_rings
      data_source: forest_cover
      title: Couverture forestière
      description: Proportion forêt/hors-forêt pour l'Emprise, les zones Non-Ultramafiques
        et Ultramafiques.
      params:
        ring_order:
        - um
        - num
        - emprise
        ring_labels:
          um: UM
          num: NUM
          emprise: Emprise
        category_colors:
          forest: '#6B8E23'
          non_forest:
            um: '#8B7355'
            num: '#C5A98B'
            emprise: '#F4E4BC'
        default_colors:
        - '#6B8E23'
        - '#8B7355'
        - '#C5A98B'
        - '#F4E4BC'
        border_width: 2.0
        height: 500
    - plugin: bar_plot
      data_source: land_use
      title: Occupation du sol
      description: Superficie occupée par type
      params:
        orientation: v
        x_axis: tops
        y_axis: counts
        labels:
          tops: ''
          counts: Superficie (ha)
        color_field: tops
        color_discrete_map:
          Sol_mineral: '#000000'
          Sol_organique: '#000000'
    - plugin: bar_plot
      data_source: elevation_distribution
      title: Distribution altitudinale
      description: Distribution altitudinale de la forêt dans l'emprise
      params:
        transform: subset_complement_stacked
        transform_params:
          data_field: elevation
          classes_field: classes
          subset_field: subset
          complement_field: complement
          class_label: altitude
          subset_label: Forêt
          complement_label: Hors-forêt
          value_field: superficie
          type_field: type
          class_suffix: m
        x_axis: superficie
        y_axis: altitude
        color_field: type
        orientation: h
        barmode: stack
        labels:
          altitude: Altitude (m)
          superficie: Superficie (ha)
          type: ''
        color_discrete_map:
          Forêt: '#228B22'
          Hors-forêt: '#F4E4BC'
    - plugin: bar_plot
      data_source: holdridge
      title: Forêt et milieux de vie
      description: Distribution de la forêt selon les milieux de vie de Holdridge
      params:
        transform: nested_dict_to_long
        transform_params:
          primary_keys:
          - forest
          - non_forest
          category_field: habitat_type
          value_field: percentage
          type_field: cover_type
        x_axis: habitat_type
        y_axis: percentage
        color_field: cover_type
        orientation: v
        barmode: group
        labels:
          habitat_type: Type d'habitat
          percentage: Couverture (%)
          cover_type: Type de couverture
        color_discrete_map:
          forest: '#1B5E20'
          non_forest: '#FBC02D'
    - plugin: donut_chart
      data_source: forest_types
      title: Types forestiers
      description: Répartition de la forêt selon les trois types
      params:
        labels_field: tops
        values_field: counts
        transform: toPercentage
        colors:
        - '#2E7D32'
        - '#7CB342'
        - '#C5E1A5'
        hole: 0.6
        legend:
          position: bottom
        show_labels_on_parts: true
    - plugin: bar_plot
      data_source: forest_cover_by_elevation
      title: Couverture forestière par altitude
      description: Distribution altitudinale de la couverture forestière en fonction
        du substrat
      params:
        transform: pyramid_chart
        transform_params:
          class_field: class_name
          series_field: series
          left_series: forest_um
          right_series: forest_num
          left_label: Forêt (UM)
          right_label: Forêt (NUM)
          class_suffix: m
          value_field: couverture
          type_field: type_foret
          class_label: altitude
        orientation: h
        x_axis: couverture
        y_axis: altitude
        color_field: type_foret
        barmode: relative
        labels:
          couverture: Couverture (%)
          altitude: Altitude (m)
          type_foret: ''
        color_discrete_map:
          Forêt (UM): '#90EE90'
          Forêt (NUM): '#2E7D32'
        filter_zero_values: false
        bar_width: 0.8
        text_auto: true
    - plugin: stacked_area_plot
      data_source: forest_types_by_elevation
      title: Types forestiers par altitude
      description: Répartition des types de forêts selon l'altitude
      params:
        transform: stacked_area_normalized
        transform_params:
          x_field: altitudes
          y_fields:
          - secondaire
          - mature
          - coeur
        x_field: altitudes
        y_fields:
        - secondaire
        - mature
        - coeur
        colors:
        - '#C5E1A5'
        - '#7CB342'
        - '#2E7D32'
        fill_type: tonexty
        axis_titles:
          x: Altitude (m)
          y: Fréquence (%)
    - plugin: radial_gauge
      data_source: fragmentation
      title: Fragmentation (Taille effective de maillage)
      description: Probabilité que deux points appartiennent au même fragment
      params:
        value_field: meff.value
        min_value: 0
        max_value: 1000
        units: km²
        value_format: .1f
        style_mode: contextual
        show_axis: false
    - plugin: stacked_area_plot
      data_source: fragmentation_distribution
      title: Fragments forestiers
      description: Aire cumulée de chaque fragment forestier classé par taille
      params:
        transform: simple_series_to_df
        transform_params:
          x_field: sizes
          y_field: values
          series_name: Aire Cumulée
          convert_to_percentage: true
        x_field: sizes
        y_fields:
        - Aire Cumulée
        colors:
        - '#4CAF50'
        fill_type: tozeroy
        log_x: true
        axis_titles:
          x: Surface (ha)
          y: Fréquence (%)
- name: json_api
  enabled: true
  exporter: json_api_exporter
  params:
    output_dir: exports/api
    detail_output_pattern: '{group}/{id}.json'
    index_output_pattern: all_{group}.json
    index_structure:
      total_key: total
      list_key: '{group}'
      include_total: true
    json_options:
      indent: 4
      ensure_ascii: false
      compress: false
      minify: false
      exclude_null: false
      geometry_precision: null
      max_array_length: null
  groups:
  - group_by: taxons
    detail:
      pass_through: true
    index:
      fields:
      - id: taxon_id
      - name: general_info.name.value
      - rank: general_info.rank.value
      - taxon_type: general_info.taxon_type.value
      - parent_family: general_info.parent_family.value
      - parent_genus: general_info.parent_genus.value
      - occurrences_count: general_info.occurrences_count.value
      - endemic: general_info.endemic.value
      - redlist_cat: general_info.redlist_cat.value
      - endemia_url: general_info.endemia_url.value
      - images: general_info.images.value
      - endpoint:
          generator: endpoint_url
          params:
            base_path: /api
  - group_by: plots
    detail:
      pass_through: true
    index:
      fields:
      - id: plot_id
      - name: locality
      - endpoint:
          generator: endpoint_url
          params:
            base_path: /api
  - group_by: shapes
    json_options:
      indent: null
      minify: true
      exclude_null: true
      geometry_precision: 6
      compress: false
    detail:
      pass_through: true
    index:
      fields:
      - id: shape_id
      - name: name
      - type: type
      - endpoint:
          generator: endpoint_url
          params:
            base_path: /api
- name: dwc_occurrence_json
  enabled: true
  exporter: json_api_exporter
  params:
    output_dir: exports/dwc/occurrence_json
    detail_output_pattern: '{group}/{id}_occurrences_dwc.json'
    index_output_pattern: taxon_index.json
    json_options:
      indent: 2
      ensure_ascii: false
  groups:
  - group_by: taxons
    transformer_plugin: niamoto_to_dwc_occurrence
    index:
      fields:
      - id: taxons_id
      - scientificName: general_info.name.value
      - taxonRank: general_info.rank.value
      - occurrences_count: general_info.occurrences_count.value
      - file_path:
          generator: endpoint_url
          params:
            base_path: ''
            pattern: taxon/{id}_occurrences_dwc.json
    transformer_params:
      occurrence_table: occurrences
      taxonomy_entity: taxons
      taxon_id_field: taxons_id
      taxonomy_external_id_column: taxons_id
      occurrence_list_source: occurrences
      mapping:
        type: Occurrence
        language: fr
        license: CC-BY-4.0
        rightsHolder: Niamoto - Nouvelle-Calédonie
        datasetName: Niamoto Export - Nouvelle-Calédonie Flore
        basisOfRecord: HumanObservation
        occurrenceID:
          generator: unique_occurrence_id
          params:
            prefix: niaocc_
            source_field: '@source.id'
        individualCount: '1'
        occurrenceStatus: present
        eventID:
          generator: unique_event_id
          params:
            prefix: niaevt_
            source_field: '@source.id'
        eventDate:
          generator: format_event_date
          params:
            source_field: '@source.month_obs'
        year:
          generator: extract_year
          params:
            source_field: '@source.month_obs'
        month:
          generator: extract_month
          params:
            source_field: '@source.month_obs'
        country: New Caledonia
        countryCode: NC
        stateProvince: '@source.province'
        minimumElevationInMeters: '@source.elevation'
        maximumElevationInMeters: '@source.elevation'
        decimalLatitude:
          generator: format_coordinates
          params:
            source_field: '@source.geo_pt'
            type: latitude
        decimalLongitude:
          generator: format_coordinates
          params:
            source_field: '@source.geo_pt'
            type: longitude
        geodeticDatum: WGS84
        identificationID:
          generator: unique_identification_id
          params:
            prefix: niaid_
            source_field: '@source.id'
        taxonID: '@taxon.taxon_id'
        scientificName: '@source.taxonref'
        kingdom: Plantae
        family: '@source.family'
        genus: '@source.genus'
        specificEpithet:
          generator: extract_specific_epithet
          params:
            source_field: '@source.taxonref'
        infraspecificEpithet:
          generator: extract_infraspecific_epithet
          params:
            source_field: '@source.taxonref'
        taxonRank: '@taxon.general_info.rank.value'
        scientificNameAuthorship: '@source.taxonref'
        dynamicProperties:
          generator: format_measurements
          params:
            measurements:
            - field: '@source.dbh'
              name: diameterAtBreastHeight
              unit: cm
            - field: '@source.height'
              name: height
              unit: m
            - field: '@source.wood_density'
              name: woodDensity
              unit: g/cm³
            - field: '@source.bark_thickness'
              name: barkThickness
              unit: mm
            - field: '@source.leaf_area'
              name: leafArea
              unit: cm²
            - field: '@source.leaf_thickness'
              name: leafThickness
              unit: µm
            - field: '@source.leaf_sla'
              name: specificLeafArea
              unit: m²/kg
        reproductiveCondition:
          generator: format_phenology
          params:
            flower_field: '@source.flower'
            fruit_field: '@source.fruit'
        habitat:
          generator: format_habitat
          params:
            holdridge_field: '@source.holdridge'
            rainfall_field: '@source.rainfall'
            substrate_field: '@source.in_um'
            forest_field: '@source.in_forest'
        establishmentMeans:
          generator: map_establishment_means
          params:
            endemic_field: '@taxon.general_info.endemic.value'
