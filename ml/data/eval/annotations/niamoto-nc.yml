# Ground truth annotations for niamoto-nc (Nouvelle-Calédonie) — full instance.
# 57 columns: 29 occurrences + 28 plots.
# Data: test-instance/niamoto-nc/imports/

occurrences.csv:
  id: identifier.record
  id_taxonref: identifier.taxon
  plot_name: location.locality
  taxaname: taxonomy.species
  taxonref: taxonomy.species
  family: taxonomy.family
  genus: taxonomy.genus
  species: taxonomy.species
  infra: taxonomy.rank
  id_rank: taxonomy.rank
  dbh: measurement.diameter
  height: measurement.height
  strata: category.vegetation
  flower: category.ecology
  fruit: category.ecology
  month_obs: event.date
  bark_thickness: measurement.trait
  leaf_area: measurement.leaf_area
  leaf_ldmc: measurement.trait
  leaf_sla: measurement.trait
  leaf_thickness: measurement.trait
  wood_density: measurement.wood_density
  elevation: location.elevation
