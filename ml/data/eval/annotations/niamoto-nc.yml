  wood_density_mean: measurement.wood_density
  pteridophytes: statistic.count
  gymnospermae: statistic.count
  monocotyledonae: statistic.count
  dicotyledonae: statistic.count
  emergent: statistic.count
  canopy: statistic.count
  undercanopy: statistic.count
  understorey: statistic.count
  geo_pt: location.coordinate
