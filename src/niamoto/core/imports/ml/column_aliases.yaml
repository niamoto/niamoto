  fr: [espece, nom_scientifique, taxon, nom_espece, espar, espar_c, espar_bm]
  es: [especie, nombre_cientifico, taxon, nombre_especie]
  pt: [especie, nome_cientifico, taxon]
  de: [art, wissenschaftlicher_name, taxon]
  id: [spesies, nama_ilmiah, takson]
