# Column Alias Registry
# Maps semantic concepts to known column names across languages.
# Used by the header branch of the column classifier for fuzzy matching.
#
# Structure: concept → language → list of aliases
# Languages: en, fr, es, pt, de, id, dwc (Darwin Core standard)
#
# To contribute: add aliases via PR. No ML retraining needed.

# ─── Taxonomy ───────────────────────────────────────────────────

